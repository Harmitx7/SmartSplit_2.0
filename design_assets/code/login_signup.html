<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Split | Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#000000",
                        "surface-dim": "#0c0e12",
                        "primary-fixed": "#ed69ff",
                        "surface-container-high": "#1d2025",
                        "secondary-fixed": "#48e4ff",
                        "tertiary": "#c4ffcd",
                        "on-secondary-container": "#eafbff",
                        "outline-variant": "#46484d",
                        "surface-bright": "#292c32",
                        "on-tertiary-container": "#005f2e",
                        "surface-container-highest": "#23262c",
                        "error-container": "#a70138",
                        "on-primary": "#540061",
                        "inverse-primary": "#a300bb",
                        "on-surface": "#f6f6fc",
                        "on-tertiary-fixed-variant": "#006a34",
                        "secondary-container": "#006877",
                        "on-primary-fixed-variant": "#51005d",
                        "tertiary-container": "#6dfe9c",
                        "on-error": "#490013",
                        "on-secondary-fixed-variant": "#005966",
                        "on-tertiary": "#006833",
                        "secondary-dim": "#1ad0eb",
                        "primary-container": "#ed69ff",
                        "tertiary-fixed": "#6dfe9c",
                        "tertiary-fixed-dim": "#5def8f",
                        "primary": "#f382ff",
                        "secondary-fixed-dim": "#29d6f1",
                        "on-secondary-fixed": "#003a43",
                        "secondary": "#3adffa",
                        "on-primary-container": "#41004c",
                        "primary-dim": "#ec63ff",
                        "inverse-on-surface": "#53555a",
                        "error-dim": "#d73357",
                        "on-surface-variant": "#aaabb0",
                        "on-secondary": "#004b56",
                        "surface-tint": "#f382ff",
                        "surface-container-low": "#111318",
                        "on-tertiary-fixed": "#004a22",
                        "surface-variant": "#23262c",
                        "surface-container-lowest": "#000000",
                        "error": "#ff6e84",
                        "surface": "#0c0e12",
                        "on-background": "#f6f6fc",
                        "on-error-container": "#ffb2b9",
                        "inverse-surface": "#f9f9ff",
                        "tertiary-dim": "#5def8f",
                        "outline": "#74757a",
                        "primary-fixed-dim": "#e451f9",
                        "surface-container": "#171a1f",
                        "background": "#0c0e12"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0c0e12;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(18, 20, 24, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .neon-glow:focus-within {
            box-shadow: 0 0 15px rgba(243, 130, 255, 0.4);
            border-color: #f382ff;
        }
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(243, 130, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(58, 223, 250, 0.08) 0%, transparent 40%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface selection:bg-primary/30 min-h-screen flex flex-col items-center justify-center p-6">
<div class="bg-mesh"></div>
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-black italic tracking-tighter text-primary">
                Smart Split
            </h1>
<div class="mt-2 h-1 w-12 bg-gradient-to-r from-primary to-secondary mx-auto rounded-full"></div>
</div>
<!-- Auth Card -->
<div class="glass-card w-full p-8 md:p-10 rounded-[2.5rem] border border-outline-variant/10 shadow-[0_40px_80px_-15px_rgba(0,0,0,0.6)]">
<header class="mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">
                    Welcome back!
                </h2>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-wide">
                    The ledger awaits your return.
                </p>
</header>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-headline text-[10px] uppercase tracking-[0.2em] font-bold text-primary px-1">Email Address</label>
<div class="relative flex items-center neon-glow transition-all duration-300 border border-outline-variant/20 rounded-2xl bg-surface-container-highest/30">
<span class="material-symbols-outlined absolute left-4 text-outline">alternate_email</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-2xl" placeholder="name@domain.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-headline text-[10px] uppercase tracking-[0.2em] font-bold text-primary">Password</label>
<a class="text-[10px] uppercase tracking-widest text-secondary font-bold hover:opacity-80" href="#">Forgot?</a>
</div>
<div class="relative flex items-center neon-glow transition-all duration-300 border border-outline-variant/20 rounded-2xl bg-surface-container-highest/30">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 rounded-2xl" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-outline cursor-pointer hover:text-on-surface">visibility</span>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-2xl shadow-[0_10px_20px_-5px_rgba(243,130,255,0.4)] active:scale-95 transition-transform" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-outline-variant/20"></div>
<span class="px-4 font-headline text-[10px] uppercase tracking-widest text-outline">or continue with</span>
<div class="flex-grow h-px bg-outline-variant/20"></div>
</div>
<!-- Social Provider -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-high/40 hover:bg-surface-container-high/60 border border-outline-variant/10 py-4 rounded-2xl transition-all duration-200 group">
<svg class="group-hover:scale-110 transition-transform" height="20" viewbox="0 0 24 24" width="20">
<path d="M24 12.27c0-.85-.07-1.53-.22-2.25H12v4.51h6.7c-.28 1.44-1.12 2.67-2.39 3.51v2.91h3.87c2.26-2.09 3.82-5.17 3.82-8.68z" fill="#EA4335"></path>
<path d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.87-2.91c-1.08.72-2.45 1.16-4.06 1.16-3.13 0-5.78-2.11-6.73-4.94H1.29v3.06C3.26 21.49 7.31 24 12 24z" fill="#FBBC05"></path>
<path d="M5.27 14.4c-.25-.72-.38-1.49-.38-2.4s.13-1.68.38-2.4V6.54H1.29C.47 8.18 0 10.04 0 12s.47 3.82 1.29 5.46l3.98-3.06z" fill="#34A853"></path>
<path d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.45-3.45C17.95 1.08 15.24 0 12 0 7.31 0 3.26 2.51 1.29 6.54l3.98 3.06c.95-2.83 3.6-4.94 6.73-4.94z" fill="#4285F4"></path>
</svg>
<span class="font-headline font-semibold text-sm tracking-tight">One-tap Google Sign-In</span>
</button>
</div>
<!-- Footer Action -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                New to Smart Split? 
                <a class="text-secondary font-bold ml-1 hover:underline underline-offset-4" href="#">Create an account</a>
</p>
</div>
<!-- Visual Decorative Elements -->
<div class="mt-16 flex items-center justify-center gap-12 opacity-30 grayscale">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl text-primary">groups</span>
<span class="font-headline text-[8px] uppercase tracking-widest mt-2">Shared</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl text-secondary">insights</span>
<span class="font-headline text-[8px] uppercase tracking-widest mt-2">Tracked</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-4xl text-tertiary">verified_user</span>
<span class="font-headline text-[8px] uppercase tracking-widest mt-2">Secured</span>
</div>
</div>
</div>
<!-- Background Atmospheric Blob -->
<div class="fixed -bottom-20 -right-20 w-80 h-80 bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed -top-20 -left-20 w-80 h-80 bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
