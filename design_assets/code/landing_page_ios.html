<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Smart Split - Ethereal Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .glass-card {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .glow-orb {
            filter: blur(100px);
            opacity: 0.35;
        }
        .ios-button-radius {
            border-radius: 14px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#000000",
                      "surface-dim": "#0c0e12",
                      "primary-fixed": "#ed69ff",
                      "surface-container-high": "#1d2025",
                      "secondary-fixed": "#48e4ff",
                      "tertiary": "#c4ffcd",

                      "on-surface": "#ffffff",
                      "on-tertiary-fixed-variant": "#006a34",
                      "secondary-container": "#006877",
                      "on-primary-fixed-variant": "#51005d",
                      "tertiary-container": "#6dfe9c",
                      "on-error": "#490013",
                      "on-secondary-fixed-variant": "#005966",
                      "on-tertiary": "#006833",
                      "secondary-dim": "#1ad0eb",
                      "primary-container": "#ed69ff",
                      "tertiary-fixed": "#6dfe9c",
                      "tertiary-fixed-dim": "#5def8f",
                      "primary": "#f382ff",
                      "secondary-fixed-dim": "#29d6f1",
                      "on-secondary-fixed": "#003a43",
                      "secondary": "#3adffa",
                      "on-primary-container": "#41004c",
                      "primary-dim": "#ec63ff",
                      "inverse-on-surface": "#53555a",
                      "error-dim": "#d73357",
                      "on-surface-variant": "#8e8e93",
                      "on-secondary": "#004b56",
                      "surface-tint": "#f382ff",

                      "error": "#ff3b30",
                      "surface": "#000000",

                      "on-error-container": "#ffb2b9",

                      "tertiary-dim": "#5def8f",
                      "outline": "#3a3a3c",
                      "primary-fixed-dim": "#e451f9",
                      "surface-container": "#1c1c1e",
                      "background": "#000000"
              },
              "fontFamily": {
                      "headline": ["Inter"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen relative selection:bg-primary selection:text-on-primary">
<!-- Atmospheric Glow Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="glow-orb absolute -top-40 -left-20 w-[600px] h-[600px] bg-primary/30 rounded-full"></div>
<div class="glow-orb absolute top-1/3 -right-40 w-[700px] h-[700px] bg-secondary/20 rounded-full"></div>
<div class="glow-orb absolute -bottom-40 left-1/3 w-[500px] h-[500px] bg-tertiary/10 rounded-full"></div>
</div>
<!-- Background Image with Overlay -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-black/60 backdrop-blur-[1px]"></div>
<img alt="Vibrant college lifestyle" class="w-full h-full object-cover opacity-20 grayscale" data-alt="Close-up of diverse college students laughing together in a modern dark lounge with neon ambient lighting and soft bokeh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8UCA0r-ckUIBizNodoIG9tGPs1zAHnSYk-CQnmp6ds37SyKKr32TUTrJg1AG6iNEynZ5rXkHf5tPqMUcZy21-nXFjAfmZjQ2aZWyMTjjfZegZ-C5a8vlPYFS7lA5oe_lreBCeVKNx7qT-cgULcgjBQfdD-RqVlgAH5NnnuDqdIQQA0IO-I7KmqOFe6DYrInyR0F9xMrvM_zj8UlmGPoloPcihtdcA0gELH4j_EAU6E1KaDGnndYULCguQEaBepdVhy_zEYheuutiW"/>
</div>
<!-- Main Canvas -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-between px-6 py-16">
<!-- Brand Identity Container -->
<div class="w-full max-w-sm flex flex-col items-center space-y-10">
<!-- Logo Section -->
<header class="flex flex-col items-center gap-5">
<div class="w-[88px] h-[88px] glass-card rounded-[22px] flex items-center justify-center relative shadow-2xl">
<div class="absolute inset-0 bg-primary/10 rounded-[22px] blur-md"></div>
<span class="material-symbols-outlined text-primary text-5xl relative z-10" data-weight="fill">account_balance_wallet</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-white">
                    Smart Split
                </h1>
</header>
<!-- Value Prop Glass Card -->
<div class="glass-card p-8 rounded-[28px] w-full text-center space-y-6">
<div class="space-y-3">
<h2 class="font-headline text-2xl md:text-3xl font-bold leading-tight tracking-tight">
                        Split expenses, <br/><span class="text-secondary">not hairs.</span>
</h2>
<p class="text-on-surface-variant text-base font-normal leading-normal px-2">
                        The easiest way for roommates and friends to track shared costs in a high-performance digital space.
                    </p>
</div>
<!-- Bento Style Feature List (iOS Pill Style) -->
<div class="grid grid-cols-2 gap-2 pt-2">
<div class="bg-white/[0.06] py-2.5 px-4 rounded-full flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-secondary text-lg" data-weight="fill">group</span>
<span class="text-[13px] font-semibold tracking-wide text-white/90">ROOMMATES</span>
</div>
<div class="bg-white/[0.06] py-2.5 px-4 rounded-full flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-tertiary text-lg" data-weight="fill">receipt_long</span>
<span class="text-[13px] font-semibold tracking-wide text-white/90">BILLS</span>
</div>
</div>
</div>
</div>
<!-- Action Cluster -->
<div class="w-full max-w-sm flex flex-col items-center gap-3 mt-auto pt-12">
<button class="w-full h-[56px] bg-primary text-on-primary font-headline text-[17px] font-semibold ios-button-radius shadow-lg active:scale-[0.98] transition-transform duration-100">
                Get Started
            </button>
<button class="w-full h-[56px] glass-card text-white font-headline text-[17px] font-semibold ios-button-radius active:scale-[0.98] transition-transform duration-100">
                Sign In
            </button>
<!-- Trust Factor (iOS Caption Style) -->
<footer class="mt-8 flex flex-col items-center gap-4 opacity-50">
<p class="font-body text-[11px] uppercase tracking-[0.08em] font-medium">Trusted by 50,000+ Students</p>
<div class="w-1 h-1 bg-white rounded-full"></div>
</footer>
</div>
</main>
</body></html>
