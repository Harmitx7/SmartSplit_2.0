<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Smart Split | Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#000000",
                        "surface-dim": "#0c0e12",
                        "primary-fixed": "#ed69ff",
                        "surface-container-high": "#1d2025",
                        "secondary-fixed": "#48e4ff",
                        "tertiary": "#c4ffcd",
                        "on-secondary-container": "#eafbff",
                        "outline-variant": "#46484d",
                        "surface-bright": "#292c32",
                        "on-tertiary-container": "#005f2e",
                        "surface-container-highest": "#23262c",
                        "error-container": "#a70138",
                        "on-primary": "#FFFFFF",
                        "inverse-primary": "#a300bb",
                        "on-surface": "#f6f6fc",
                        "on-tertiary-fixed-variant": "#006a34",
                        "secondary-container": "#006877",
                        "on-primary-fixed-variant": "#51005d",
                        "tertiary-container": "#6dfe9c",
                        "on-error": "#490013",
                        "on-secondary-fixed-variant": "#005966",
                        "on-tertiary": "#006833",
                        "secondary-dim": "#1ad0eb",
                        "primary-container": "#ed69ff",
                        "tertiary-fixed": "#6dfe9c",
                        "tertiary-fixed-dim": "#5def8f",
                        "primary": "#f382ff",
                        "secondary-fixed-dim": "#29d6f1",
                        "on-secondary-fixed": "#003a43",
                        "secondary": "#3adffa",
                        "on-primary-container": "#41004c",
                        "primary-dim": "#ec63ff",
                        "inverse-on-surface": "#53555a",
                        "error-dim": "#d73357",
                        "on-surface-variant": "#aaabb0",
                        "on-secondary": "#004b56",
                        "surface-tint": "#f382ff",
                        "surface-container-low": "#111318",
                        "on-tertiary-fixed": "#004a22",
                        "surface-variant": "#23262c",
                        "surface-container-lowest": "#000000",
                        "error": "#ff6e84",
                        "surface": "#0c0e12",
                        "on-background": "#f6f6fc",
                        "on-error-container": "#ffb2b9",
                        "inverse-surface": "#f9f9ff",
                        "tertiary-dim": "#5def8f",
                        "outline": "#74757a",
                        "primary-fixed-dim": "#e451f9",
                        "surface-container": "#171a1f",
                        "background": "#0c0e12"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0c0e12;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ios-input-group {
            background: rgba(44, 44, 46, 0.5);
            border-radius: 10px;
        }
        .ios-input-divider {
            height: 0.5px;
            background: rgba(84, 84, 88, 0.65);
            margin-left: 16px;
        }
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(243, 130, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(58, 223, 250, 0.08) 0%, transparent 40%);
        }
        /* Apple-style button press effect */
        .ios-btn:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="font-body text-on-surface selection:bg-primary/30 min-h-screen flex flex-col items-center justify-start pt-16 p-6">
<div class="bg-mesh"></div>
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-white">
            Smart Split
        </h1>
<div class="mt-3 h-1.5 w-10 bg-primary mx-auto rounded-full"></div>
</div>
<!-- Auth Card -->
<div class="glass-card w-full p-6 md:p-8 rounded-[2rem] border border-white/10">
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold tracking-tight text-white">
                Welcome Back
            </h2>
<p class="text-on-surface-variant text-[15px] mt-1 font-normal opacity-80">
                Sign in to manage your shared expenses.
            </p>
</header>
<form class="space-y-6">
<!-- iOS Style Input Group -->
<div class="ios-input-group overflow-hidden">
<div class="relative flex items-center px-4 py-3.5">
<span class="material-symbols-outlined text-outline text-[20px] mr-3">alternate_email</span>
<input class="w-full bg-transparent border-none p-0 text-[17px] text-white placeholder:text-outline/60 focus:ring-0" placeholder="Email" type="email"/>
</div>
<div class="ios-input-divider"></div>
<div class="relative flex items-center px-4 py-3.5">
<span class="material-symbols-outlined text-outline text-[20px] mr-3">lock</span>
<input class="w-full bg-transparent border-none p-0 text-[17px] text-white placeholder:text-outline/60 focus:ring-0" placeholder="Password" type="password"/>
<button class="text-secondary text-[14px] font-medium ml-2" type="button">Show</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-[-12px]">
<a class="text-[14px] text-secondary font-medium hover:opacity-70 transition-opacity" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="ios-btn w-full bg-primary text-white font-headline font-semibold py-3.5 rounded-xl text-[17px] transition-all shadow-lg shadow-primary/20" type="submit">
                Sign In
            </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[0.5px] bg-white/10"></div>
<span class="px-4 text-[13px] font-medium text-outline uppercase tracking-wider">or</span>
<div class="flex-grow h-[0.5px] bg-white/10"></div>
</div>
<!-- Google Sign-In (HIG Compliant) -->
<button class="ios-btn w-full flex items-center justify-center gap-3 bg-white text-black py-3.5 rounded-xl transition-all border border-transparent shadow-sm">
<svg height="18" viewbox="0 0 24 24" width="18">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[17px] font-semibold">Sign in with Google</span>
</button>
</div>
<!-- Footer Action -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-[15px] font-medium">
            New to Smart Split? 
            <a class="text-secondary font-semibold ml-1 hover:opacity-70 transition-opacity" href="#">Create an account</a>
</p>
</div>
<!-- Visual Decorative Elements (Simplified for iOS aesthetics) -->
<div class="mt-16 flex items-center justify-center gap-12 opacity-40">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[28px] text-white">groups</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-2">Shared</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[28px] text-white">insights</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-2">Tracked</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[28px] text-white">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest mt-2">Secured</span>
</div>
</div>
</div>
<!-- Background Atmospheric Blobs -->
<div class="fixed -bottom-20 -right-20 w-80 h-80 bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
<div class="fixed -top-20 -left-20 w-80 h-80 bg-secondary/5 blur-[100px] rounded-full pointer-events-none"></div>
</body></html>
