<!-- iOS Modal Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0c0e12]/80 backdrop-blur-xl ios-border-bottom">
<div class="flex justify-between items-center px-4 py-3">
<button class="text-primary text-lg font-normal hover:opacity-70 transition-opacity">
                Cancel
            </button>
<h1 class="font-semibold text-lg tracking-tight">Smart Split</h1>
<button class="text-primary text-lg font-semibold hover:opacity-70 transition-opacity">
                Done
            </button>
</div>
</header>
<main class="flex-grow pt-16 pb-12 flex flex-col max-w-2xl mx-auto w-full">
<!-- Amount Input (iOS Large Header Style) -->
<section class="flex flex-col items-center justify-center py-12 px-6">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/50 mb-2">Total Amount</span>
<div class="relative w-full flex justify-center">
<input class="bg-transparent border-none text-center font-bold text-7xl md:text-8xl text-on-surface focus:ring-0 w-full placeholder-on-surface-variant/20" placeholder="$0.00" type="text" value="$0.00"/>
</div>
</section>
<!-- iOS Form Style List -->
<div class="px-4 space-y-8">
<!-- Form Group: Details -->
<section class="space-y-2">
<div class="bg-surface-container/60 glass-panel rounded-2xl overflow-hidden">
<div class="relative ios-border-bottom flex items-center">
<input class="w-full bg-transparent border-none px-4 py-4 text-base focus:ring-0 placeholder:text-on-surface-variant/40" placeholder="Description" type="text"/>
<div class="pr-4">
<span class="material-symbols-outlined text-on-surface-variant/40 text-xl">edit_note</span>
</div>
</div>
</div>
</section>
<!-- Payer Selection -->
<section class="space-y-3">
<div class="flex justify-between items-center px-2">
<h3 class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant/60">Who Paid?</h3>
<span class="text-[10px] font-bold text-primary uppercase">Required</span>
</div>
<div class="flex gap-3 overflow-x-auto pb-1 no-scrollbar -mx-4 px-4">
<!-- You Chip (Active) -->
<button class="flex-shrink-0 flex items-center gap-3 px-4 py-2.5 rounded-full bg-primary/20 border border-primary/20 text-primary transition-all">
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/30">

</div>
<span class="font-semibold text-sm">You</span>
</button>
<!-- Bob Chip -->
<button class="flex-shrink-0 flex items-center gap-3 px-4 py-2.5 rounded-full bg-surface-container-high glass-panel text-on-surface-variant">
<div class="w-8 h-8 rounded-full overflow-hidden grayscale opacity-80">
<img class="w-full h-full object-cover" data-alt="portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoOy9yn8-XZa2jK1IP5YE57dlIvGpUGN0510hoIG5hbRJkyCoP6gQPNNi5fHX3guaj02u8L4wilcH3zGdPm0Zn7EUBm4GHQIiT5WW8YyGPg52AXsdWzGPnqY6gJ8V4HaLx9Xx-QMFJL1uBG78fmY1MVCUqO4DjmnWRV5Ss5LAO9bEZj9Fw_zLw-j7fOFZexBy7LHx7cDS3ttcJlugxmrbNVMaUFqTm2KgMpikBimVWy3FjjpnCQZaNvX7PHqHuSpFjPF5aanxoCHKW"/>
</div>
<span class="font-medium text-sm">Bob</span>
</button>
<!-- Alice Chip -->
<button class="flex-shrink-0 flex items-center gap-3 px-4 py-2.5 rounded-full bg-surface-container-high glass-panel text-on-surface-variant">
<div class="w-8 h-8 rounded-full overflow-hidden grayscale opacity-80">
<img class="w-full h-full object-cover" data-alt="portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAud-mWKBPds6dvz8clQDnH-_yoLGKfuqH8my9BVxiJRqukPmql2gqRLEy0hWLXgzorZJ_7LIv3um0ohjBJJeamYCqoHgadh0r6et24tSM4QRAqJD4A2AxoLv-L1a3hAPVbEWuU3hae9wXm00GoTOAK-86WQPsQIvOO-vM-_ccvE3Uxycvyp6AXguJmMfhTjB93rhqt3L4CGJp7AspqkivdLSgRRj1cYivk_P5u1ZhcHp-wp9YfdkDwSbj5p0NOKAhR62QkwIxt77q0"/>
</div>
<span class="font-medium text-sm">Alice</span>

</div>
</section>
<!-- Split Logic (iOS Segmented Control) -->
<section class="space-y-3">
<h3 class="px-2 text-xs font-semibold uppercase tracking-wider text-on-surface-variant/60">Split Method</h3>
<div class="ios-segmented-bg p-1 rounded-xl flex items-center">
<button class="flex-1 ios-segmented-item-active py-1.5 rounded-lg text-sm font-semibold text-on-surface transition-all">
                        Equal
                    </button>
<button class="flex-1 py-1.5 rounded-lg text-sm font-medium text-on-surface-variant transition-all hover:text-on-surface">
                        Percentage
                    </button>
<button class="flex-1 py-1.5 rounded-lg text-sm font-medium text-on-surface-variant transition-all hover:text-on-surface">
                        Manual
                    </button>
</div>
</section>
<!-- Summary Card -->
<section class="glass-panel p-5 rounded-2xl space-y-5">
<div class="flex justify-between items-center">
<span class="font-semibold text-sm text-on-surface-variant">Split Preview</span>
<span class="text-tertiary font-bold text-sm">$0.00 / person</span>
</div>
<div class="space-y-4">
<div class="flex gap-1 h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary/80"></div>
<div class="h-full w-1/3 bg-secondary/80"></div>
<div class="h-full w-1/3 bg-tertiary/80"></div>

<div class="flex justify-between">
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<span class="text-[10px] text-on-surface-variant/80 font-semibold uppercase">You</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="text-[10px] text-on-surface-variant/80 font-semibold uppercase">Bob</span>
</div>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<span class="text-[10px] text-on-surface-variant/80 font-semibold uppercase">Alice</span>
</div>
</div>
</div>
</section>
<!-- Final Action -->
<section class="pt-4">
<button class="w-full py-4 rounded-2xl bg-primary text-on-primary-fixed font-bold text-lg tracking-tight active:scale-95 transition-transform shadow-lg shadow-primary/20">
                    Confirm Expense
                </button>
</section>
</div>
</main>
<!-- Navigation Spacer -->
<div class="h-8"></div>
